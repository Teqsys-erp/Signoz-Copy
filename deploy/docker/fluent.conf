# ============================================
# 🐳 DOCKER CONTAINER LOGS
# ============================================
<source>
  @type tail
  path /var/lib/docker/containers/*/*-json.log
  pos_file /fluentd/log/docker.log.pos
  tag docker.*
  read_from_head true
  <parse>
    @type json
    time_key time
    time_format %Y-%m-%dT%H:%M:%S.%NZ
  </parse>
</source>

# ============================================
# 🖥️ INFRA LOG 1 - System Logs (syslog)
# ============================================
<source>
  @type tail
  path /var/log/syslog
  pos_file /fluentd/log/syslog.pos
  tag system.syslog
  read_from_head true
  <parse>
    @type syslog
  </parse>
</source>

# ============================================
# 🖥️ INFRA LOG 2 - Auth Logs (auth.log)
# ============================================
<source>
  @type tail
  path /var/log/auth.log
  pos_file /fluentd/log/auth.pos
  tag system.auth
  read_from_head true
  <parse>
    @type syslog
  </parse>
</source>

# ============================================
# Forward ALL logs to SigNoz OTel Collector
# ============================================
<match **>
  @type forward
  send_timeout 60s
  recover_wait 10s
  hard_timeout 60s

  <server>
    name myserver1
    host signoz-otel-collector
    port 24224
  </server>
</match>

