connectors:
  signozmeter:
    metrics_flush_interval: 1h
    dimensions:
      - name: service.name
      - name: deployment.environment
      - name: host.name

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

  # --- Prometheus scrape jobs ---
  prometheus:
    config:
      global:
        scrape_interval: 60s
      scrape_configs:
        # Existing: OTel Collector self-metrics
        - job_name: otel-collector
          static_configs:
            - targets:
                - localhost:8888
              labels:
                job_name: otel-collector

        # Traefik metrics
        - job_name: traefik
          scrape_interval: 30s
          static_configs:
            - targets:
                - traefik-traefik-1:8082
              labels:
                job_name: traefik

  # MariaDB metrics
  mysql:
    endpoint: mariadb-database:3306
    username: otel_monitor
    password: monitor        # <-- Replace with your actual password
    collection_interval: 30s
    initial_delay: 1s

  # Docker container metrics
  docker_stats:
    endpoint: unix:///var/run/docker.sock
    collection_interval: 30s
    timeout: 20s
    api_version: "1.44"

  fluentforward:
    endpoint: 0.0.0.0:24224

  # HTTP endpoint monitoring
  httpcheck:
    targets:
      - endpoint: https://monitor.vantageo.com/
        method: GET
    collection_interval: 300s  # 5 minutes

  # =============================================
  # HOST METRICS (NEW)
  # root_path is required when running in Docker.
  # The host filesystem is mounted at /hostfs.
  # =============================================
  hostmetrics:
    root_path: /hostfs
    collection_interval: 60s
    scrapers:
      cpu: {}
      disk: {}
      load: {}
      filesystem: {}
      memory: {}
      network: {}
      nfs: {}            # Linux only
      paging: {}
      process:
        mute_process_name_error: true
        mute_process_exe_error: true
        mute_process_io_error: true
        mute_process_user_error: true
      processes: {}
      system: {}

processors:
  batch:
    send_batch_size: 10000
    send_batch_max_size: 11000
    timeout: 10s
  batch/meter:
    send_batch_max_size: 25000
    send_batch_size: 20000
    timeout: 1s
  resourcedetection:
    # Using OTEL_RESOURCE_ATTRIBUTES envvar, env detector adds custom labels.
    detectors: [env, system]
    timeout: 2s
  signozspanmetrics/delta:
    metrics_exporter: signozclickhousemetrics
    metrics_flush_interval: 60s
    latency_histogram_buckets: [100us, 1ms, 2ms, 6ms, 10ms, 50ms, 100ms, 250ms, 500ms, 1000ms, 1400ms, 2000ms, 5s, 10s, 20s, 40s, 60s]
    dimensions_cache_size: 100000
    aggregation_temporality: AGGREGATION_TEMPORALITY_DELTA
    enable_exp_histogram: true
    dimensions:
      - name: service.namespace
        default: default
      - name: deployment.environment
        default: default
      - name: signoz.collector.id
      - name: service.version
      - name: browser.platform
      - name: browser.mobile
      - name: k8s.cluster.name
      - name: k8s.node.name
      - name: k8s.namespace.name
      - name: host.name
      - name: host.type
      - name: container.name

extensions:
  health_check:
    endpoint: 0.0.0.0:13133
  pprof:
    endpoint: 0.0.0.0:1777

exporters:
  clickhousetraces:
    datasource: tcp://clickhouse:9000/signoz_traces
    low_cardinal_exception_grouping: ${env:LOW_CARDINAL_EXCEPTION_GROUPING}
    use_new_schema: true
  signozclickhousemetrics:
    dsn: tcp://clickhouse:9000/signoz_metrics
  clickhouselogsexporter:
    dsn: tcp://clickhouse:9000/signoz_logs
    timeout: 10s
    use_new_schema: true
  signozclickhousemeter:
    dsn: tcp://clickhouse:9000/signoz_meter
    timeout: 45s
    sending_queue:
      enabled: false
  metadataexporter:
    cache:
      provider: in_memory
    dsn: tcp://clickhouse:9000/signoz_metadata
    enabled: true
    timeout: 45s

service:
  telemetry:
    logs:
      encoding: json
  extensions:
    - health_check
    - pprof
  pipelines:
    traces:
      receivers: [otlp]
      processors: [signozspanmetrics/delta, batch]
      exporters: [clickhousetraces, metadataexporter, signozmeter]

    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [signozclickhousemetrics, metadataexporter, signozmeter]

    # Prometheus pipeline — handles OTel Collector self-metrics + Traefik scrape
    metrics/prometheus:
      receivers: [prometheus]
      processors: [batch]
      exporters: [signozclickhousemetrics, metadataexporter, signozmeter]

    # MariaDB metrics pipeline
    metrics/mysql:
      receivers: [mysql]
      processors: [batch]
      exporters: [signozclickhousemetrics, metadataexporter, signozmeter]

    # Docker container metrics pipeline
    metrics/docker:
      receivers: [docker_stats]
      processors: [batch]
      exporters: [signozclickhousemetrics, metadataexporter, signozmeter]

    # HTTP endpoint monitoring pipeline
    metrics/httpcheck:
      receivers: [httpcheck]
      processors: [batch]
      exporters: [signozclickhousemetrics, metadataexporter, signozmeter]

    # =============================================
    # HOST METRICS PIPELINE (NEW)
    # resourcedetection must come before batch so
    # host.name is attached before metrics are sent.
    # =============================================
    metrics/hostmetrics:
      receivers: [hostmetrics]
      processors: [resourcedetection, batch]
      exporters: [signozclickhousemetrics, metadataexporter, signozmeter]

    logs:
      receivers: [otlp, fluentforward]
      processors: [batch]
      exporters: [clickhouselogsexporter, metadataexporter, signozmeter]

    metrics/meter:
      receivers: [signozmeter]
      processors: [batch/meter]
      exporters: [signozclickhousemeter]
